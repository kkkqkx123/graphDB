[package]
name = "graphdb"
version = "0.1.0"
edition = "2021"
description = "A lightweight single-node graph database implemented in Rust"
authors = ["GraphDB Contributors"]
license = "Apache-2.0"
repository = "https://github.com/vesoft-inc/nebula"
homepage = "https://github.com/vesoft-inc/nebula"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "net", "time", "signal", "sync"] }
tokio-stream = "0.1"
redb = { version = "2.0.0", optional = true }
clap = { version = "4.5.53", features = ["derive"] }
log = "0.4.29"
flexi_logger = { version = "0.31", features = ["async"] }
thiserror = "2.0.17"
moka = { version = "0.12", features = ["sync", "future"] }
lru = "0.16.2"
bincode = { version = "2.0.1", features = ["serde", "derive"] }
toml = "0.9.8"
num_cpus = "1.17.0"
uuid = { version = "1.19.0", features = ["v4"] }
chrono = { version = "0.4.38", features = ["serde"] }
bcrypt = "0.18.0"
regex = "1.11.1"
rand = "0.8.5"
rayon = "1.10.0"
dashmap = "6.1"
parking_lot = "0.12"
crossbeam-utils = "0.8"
sysinfo = "0.30"
dec = "0.4.11"
futures = "0.3"
tracing = "0.1"
metrics = "0.23"

axum = { version = "0.8", features = ["macros"], optional = true }
tower = { version = "0.5", optional = true }
tower-http = { version = "0.6", features = ["cors", "trace", "timeout", "limit"], optional = true }
http = { version = "1.1", optional = true }

# gRPC dependencies
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }

# Web management dependencies (SQLite for metadata storage)
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "migrate", "chrono"], optional = true }
async-trait = { version = "0.1", optional = true }

# Full-text search engines
bm25-service = { path = "crates/bm25", default-features = false, features = ["embedded", "storage-tantivy"] }
inversearch-service = { path = "crates/inversearch", default-features = false, features = ["embedded", "store"] }
tantivy = "0.24"

# Vector search engine
vector-client = { path = "crates/vector-client", features = ["qdrant"] }

# To enable llama-cpp with Vulkan GPU acceleration, use:
# vector-client = { path = "crates/vector-client", features = ["qdrant", "llama_cpp"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["processthreadsapi", "psapi", "sysinfoapi", "fileapi", "minwinbase"] }

[lib]
name = "graphdb"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "graphdb-server"
path = "src/main.rs"
required-features = ["server"]

[build-dependencies]
cbindgen = { version = "0.29", optional = true }
tonic-build = { version = "0.12", optional = true }
prost-build = { version = "0.13", optional = true }

[features]
default = ["server", "redb"]

# Storage backend
redb = ["dep:redb"]

# Vector search backend
qdrant = ["vector-client/qdrant"]

# Embedded API for standalone/embedded usage (Rust API only)
embedded = []

# C API bindings (requires embedded, enables cdylib generation and cbindgen)
c-api = ["embedded", "dep:cbindgen"]

# Server API (HTTP/Web interface)
server = [
    "dep:axum",
    "dep:tower",
    "dep:tower-http",
    "dep:http",
    "dep:sqlx",
    "dep:async-trait",
]

# gRPC API
grpc = ["dep:tonic", "dep:prost", "dep:tonic-build", "dep:prost-build"]

[dev-dependencies]
tokio-test = "0.4.4"
tempfile = "3.23.0"
criterion = { version = "0.5", features = ["async_tokio"] }
serial_test = "3.0"

[profile.dev]
opt-level = 0
debug = true
codegen-units = 64
