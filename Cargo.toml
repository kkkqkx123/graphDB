[package]
name = "graphdb"
version = "0.1.0"
edition = "2021"
description = "A lightweight single-node graph database implemented in Rust"
authors = ["GraphDB Contributors"]
license = "Apache-2.0"
repository = "https://github.com/vesoft-inc/nebula"
homepage = "https://github.com/vesoft-inc/nebula"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
sled = "0.34"
clap = { version = "4.0", features = ["derive"] }
log = "0.4"
env_logger = "0.10"
thiserror = "1.0"
anyhow = "1.0"
lru = "0.12"
bincode = "1.3"
toml = "0.8"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"