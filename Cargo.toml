[package]
name = "graphdb"
version = "0.1.0"
edition = "2021"
description = "A lightweight single-node graph database implemented in Rust"
authors = ["GraphDB Contributors"]
license = "Apache-2.0"
repository = "https://github.com/vesoft-inc/nebula"
homepage = "https://github.com/vesoft-inc/nebula"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["full"] }
sled = "0.34.7"
clap = { version = "4.5.53", features = ["derive"] }
log = "0.4.29"
env_logger = "0.11.8"
thiserror = "2.0.17"
anyhow = "1.0.100"
lru = "0.16.2"
bincode = { version = "2.0.1", features = ["serde", "derive"] }
toml = "0.9.8"
signal-hook = { version = "0.3.18", features = ["iterator"] }
futures = "0.3.31"

[dev-dependencies]
tokio-test = "0.4.4"
tempfile = "3.23.0"
