# cbindgen 配置文件
# 用于自动生成 C 头文件

language = "C"

# 头文件配置
header = """/* GraphDB C API
 * 提供 GraphDB 的 C 语言接口
 * 版本: 0.1.0
 * 许可: Apache-2.0
 */"""

# 包含保护
include_guard = "GRAPHDB_H"

# 使用 pragma once
pragma_once = true

# 命名规则
[export]
# 导出的项前缀
prefix = "GRAPHDB_"
# 排除的项
exclude = []

# 枚举配置
[enum]
# 枚举前缀
prefix_with_name = true
# 枚举命名风格
rename_variants = "ScreamingSnakeCase"

# 结构体配置
[struct]
# 结构体前缀
prefix_with_name = true
# 结构体命名风格
rename_fields = "ScreamingSnakeCase"

# 函数配置
[fn]
# 函数前缀
prefix = "GRAPHDB_"

# 解析配置
[parse]
# 解析依赖
parse_deps = true
# 包含的 crate
include = ["graphdb"]
# 排除的 crate
exclude = []

# 常量配置
[const]
# 常量前缀
prefix = "GRAPHDB_"

# 宏配置
[macro]
# 宏前缀
prefix = "GRAPHDB_"

# 类型别名配置
[type_alias]
# 类型别名前缀
prefix_with_name = true

# 布局配置
[layout]
# 字段对齐
packed = false
# 字段顺序
reorder_fields = false

# 文档配置
[documentation]
# 文档风格
style = "auto"
# 文档长度
brief = "short"
# 文档详细程度
details = "full"

# 格式化配置
[format]
# 缩进大小
tab_spaces = 4
# 使用制表符
use_tab = false
# 行长度
line_length = 100

# 排序配置
[sorting]
# 按字母顺序排序
sort_by = "Name"
