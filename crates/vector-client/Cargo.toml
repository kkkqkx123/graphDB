[package]
name = "vector-client"
version = "0.1.0"
edition = "2021"
description = "A vector database client crate with support for multiple backends"

[lib]
name = "vector_client"
path = "src/lib.rs"

[features]
default = ["qdrant", "mock"]
qdrant = ["qdrant-client"]
mock = []

[dependencies]
async-trait = "0.1"
tokio = { version = "1.48", features = ["rt-multi-thread", "macros", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"

qdrant-client = { version = "1.17", optional = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.10"
